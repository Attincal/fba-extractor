name: 打包Windows程序

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
    
    - name: 安装Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: 安装Tesseract
      run: |
        choco install tesseract -y
    
    - name: 安装依赖包
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pandas openpyxl PyMuPDF pytesseract Pillow
    
    - name: 打包程序
      run: |
        mkdir temp_build
        copy "C:\Program Files\Tesseract-OCR\tesseract.exe" temp_build\
        mkdir temp_build\tessdata
        copy "C:\Program Files\Tesseract-OCR\tessdata\chi_sim.traineddata" temp_build\tessdata\
        copy "C:\Program Files\Tesseract-OCR\tessdata\eng.traineddata" temp_build\tessdata\
        pyinstaller --onefile --windowed --name="FBA仓库代码提取器" --add-data "temp_build\tesseract.exe;." --add-data "temp_build\tessdata;tessdata" --hidden-import=pytesseract --hidden-import=PIL --hidden-import=fitz --hidden-import=pandas --hidden-import=openpyxl fba_extractor.py
    
    - name: 上传打包文件
      uses: actions/upload-artifact@v3
      with:
        name: FBA仓库代码提取器
        path: dist/FBA仓库代码提取器.exe
